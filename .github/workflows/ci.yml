name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Prebuilt tool versions, pinned so CI does not drift with upstream releases.
  # Bump deliberately. Both are installed from official release tarballs below
  # instead of `cargo install` (minutes of compile) or third-party actions.
  NEXTEST_VERSION: 0.9.138
  CARGO_DENY_VERSION: 0.19.9

jobs:
  # Type-check + lint + style gates. Runs in parallel with the test matrix so
  # clippy is never on the test critical path. clippy --all-targets subsumes
  # the old standalone `cargo check` for every crate except kleos-migrate,
  # which keeps its own check step (it is excluded from clippy/tests due to
  # linker conflicts, but `cargo check` does not link).
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        # Reclaim ~20-30GB of preinstalled toolchains we do not use, so the
        # workspace build artifacts have headroom on the 14GB hosted runner.
        # Inline rm avoids a third-party action.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libpcsclite-dev

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Clippy
        run: cargo clippy --workspace --exclude kleos-migrate --all-targets -- -D warnings

      - name: Check kleos-migrate
        # kleos-migrate is excluded from clippy and tests (linker conflicts),
        # so type-check it explicitly to keep it covered by CI.
        run: cargo check -p kleos-migrate

      - name: Check ml-off builds
        # The default-on `ml` feature gates the ONNX/LanceDB stack; keep the
        # lean configuration compiling so the gate does not rot.
        run: cargo check -p kleos-lib -p kleos-server --no-default-features

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Verify MSRV declaration in workspace
        run: |
          grep -q 'rust-version = "1.94"' Cargo.toml \
            || { echo "workspace rust-version not declared or drifted"; exit 1; }

  # Build and run the test suite under cargo-nextest, split across two runners.
  # cargo test runs the workspace's ~97 test binaries strictly serially (~17min
  # of execution); nextest schedules individual tests from all binaries onto
  # all cores, and the hash partition halves the remaining wall clock. Hash
  # partitioning is stable across runs, so every test runs in exactly one shard.
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2]

    env:
      # Test binaries statically link the full native dependency tree (lance,
      # datafusion, arrow, tantivy, ort). With debuginfo the link inputs are
      # multi-GB and ld SIGBUSes once the 14GB hosted-runner disk fills. CI does
      # not debug, so drop test-profile debuginfo to shrink the link inputs.
      CARGO_PROFILE_TEST_DEBUG: "0"

    steps:
      - name: Free disk space
        # Reclaim ~20-30GB of preinstalled toolchains we do not use, so the heavy
        # workspace test link has headroom. Inline rm avoids a third-party action.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libpcsclite-dev

      - name: Cache cargo registry and target dir
        # Both partitions compile the identical artifact set, so they share one
        # cache and only partition 1 uploads it (a second save would be a no-op
        # race against the immutable cache key).
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          save-if: ${{ matrix.partition == 1 }}

      - name: Install cargo-nextest
        run: curl -LsSf "https://get.nexte.st/${NEXTEST_VERSION}/linux" | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"

      - name: Test workspace (excluding kleos-migrate due to linker conflicts)
        run: cargo nextest run --workspace --exclude kleos-migrate --partition "hash:${{ matrix.partition }}/2"

      - name: Doc-tests
        # nextest does not run doctests; run them once, on partition 1 only.
        if: ${{ matrix.partition == 1 }}
        run: cargo test --doc --workspace --exclude kleos-migrate

  deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Install cargo-deny
        # Prebuilt release binary; `cargo install --locked cargo-deny` spent
        # ~2min compiling it from source on every run.
        run: |
          curl -LsSf "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar zx --strip-components=1 -C "$HOME/.cargo/bin" "cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny"

      - name: Check licenses, sources, and advisories
        run: |
          if [ ! -f deny.toml ]; then
            echo "deny.toml missing -- CI policy requires it"
            exit 1
          fi
          cargo deny check
