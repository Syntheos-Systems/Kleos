name: Mirror to Syntheos-Systems
on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: the mirror only reads the repo (checkout) and
# pushes to an external remote via MIRROR_TOKEN, so read-only contents suffices.
permissions:
  contents: read

# Serialize mirror runs. Every run force-pushes the FULL set of branches and
# tags, so the newest run always carries complete state -- cancel any older
# in-flight run rather than letting two concurrent force-pushes race on the
# server-side ref-lock CAS ("cannot lock ref 'refs/heads/main'"), which failed
# the mirror on nearly every rapid push sequence. Cancelled runs do not send
# failure emails, unlike the rejected pushes they replace.
concurrency:
  group: mirror-to-syntheos
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Push mirror
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git remote add mirror https://x-access-token:${MIRROR_TOKEN}@github.com/Syntheos-Systems/Kleos.git
          git push mirror --all --force
          git push mirror --tags --force
