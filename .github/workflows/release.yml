name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        env:
          CARGO_BUILD_JOBS: "2"
        run: cargo build --release -p engram-server -p engram-cli -p engram-sidecar -p engram-credd -p engram-cred -p engram-mcp

      - name: Collect binaries
        run: |
          mkdir -p release-artifacts
          for bin in engram-server engram-cli engram-sidecar engram-credd engram-cred; do
            if [ -f target/release/$bin ]; then
              cp target/release/$bin release-artifacts/${bin}-linux-x64
            fi
          done
          ls -lh release-artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghostframe/engram:latest
            ghostframe/engram:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-crates:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # engram-lib first (no internal deps)
          cargo publish -p engram-lib --no-verify || echo "engram-lib already published"
          sleep 30

          # engram-cred (no internal deps)
          cargo publish -p engram-cred --no-verify || echo "engram-cred already published"
          sleep 30

          # These depend on engram-lib and/or engram-cred
          cargo publish -p engram-server --no-verify || echo "engram-server already published"
          sleep 15
          cargo publish -p engram-cli --no-verify || echo "engram-cli already published"
          sleep 15
          cargo publish -p engram-mcp --no-verify || echo "engram-mcp already published"

  publish-npm:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build and publish TypeScript SDK
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm run build
          npm publish --access public
