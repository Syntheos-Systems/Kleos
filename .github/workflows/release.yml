name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2

      # Serialized builds: the GitHub Actions runner has roughly 7 GiB of
      # RAM. Compiling every release binary in a single cargo invocation
      # runs out of memory at link time (exit 143 / SIGKILL). Splitting
      # into staged invocations keeps peak memory well under the limit
      # while still benefiting from the shared incremental cache.
      - name: Build engram-server
        env:
          CARGO_BUILD_JOBS: "2"
        run: cargo build --release -p engram-server

      - name: Build engram-cli and engram-sidecar
        env:
          CARGO_BUILD_JOBS: "2"
        run: cargo build --release -p engram-cli -p engram-sidecar

      - name: Build engram-credd, engram-cred, engram-mcp
        env:
          CARGO_BUILD_JOBS: "2"
        run: cargo build --release -p engram-credd -p engram-cred -p engram-mcp

      - name: Collect binaries
        run: |
          mkdir -p release-artifacts
          for bin in engram-server engram-cli engram-sidecar engram-credd engram-cred engram-mcp; do
            if [ -f target/release/$bin ]; then
              cp target/release/$bin release-artifacts/${bin}-linux-x64
            fi
          done
          ls -lh release-artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    # Independent of build-and-release: Docker builds from source inside
    # its own multi-stage image, and crates/npm publishes do not consume
    # the release binaries. Decoupling keeps a binary-build OOM from
    # blocking the registry pushes.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghostframe/engram:latest
            ghostframe/engram:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-crates:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Independent of build-and-release: Docker builds from source inside
    # its own multi-stage image, and crates/npm publishes do not consume
    # the release binaries. Decoupling keeps a binary-build OOM from
    # blocking the registry pushes.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # publish() swallows only the specific "already uploaded"
        # response so we keep the job idempotent across re-runs while
        # still surfacing genuine publish failures (auth, size limit,
        # unresolved deps, manifest errors).
        run: |
          set -euo pipefail
          publish() {
            local crate="$1"
            local out
            if out=$(cargo publish -p "$crate" --no-verify 2>&1); then
              echo "$out"
            else
              echo "$out"
              if echo "$out" | grep -qE 'already (uploaded|exists)|crate version .* is already uploaded'; then
                echo "::warning::$crate already published, skipping"
                return 0
              fi
              return 1
            fi
          }
          # Only engram-lib and engram-cred publish to crates.io. The
          # names engram-server, engram-cli, and engram-mcp are held by
          # third-party squatters (see crates.io/crates/engram-server
          # owner federicorinaldi, engram-mcp owner edg-l) whose
          # publications postdate the original TypeScript Engram but
          # preempt this Rust rewrite in the registry. Binaries ship
          # through Docker Hub and the GitHub release artifacts instead.
          publish engram-lib
          sleep 30
          publish engram-cred

  publish-npm:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    # Independent of build-and-release: Docker builds from source inside
    # its own multi-stage image, and crates/npm publishes do not consume
    # the release binaries. Decoupling keeps a binary-build OOM from
    # blocking the registry pushes.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build and publish TypeScript SDK
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm run build
          npm publish --access public
