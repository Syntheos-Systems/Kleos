# Woodpecker CI pipeline for Kleos
# Runs on hetzner-dedi local runner (Podman backend)

when:
  - event: [push, pull_request, tag]

variables:
  - &rust_image "rust:1.94-bookworm"
  - &install_deps >-
    apt-get update &&
    apt-get install -y --no-install-recommends
    protobuf-compiler libpcsclite-dev pkg-config libssl-dev clang libprotobuf-dev
    && rm -rf /var/lib/apt/lists/*

steps:
  # ── CI checks (push to main + PRs) ──────────────────────────
  check:
    image: *rust_image
    when:
      - event: [push, pull_request]
    commands:
      - *install_deps
      - cargo check --workspace

  clippy:
    image: *rust_image
    when:
      - event: [push, pull_request]
    depends_on: [check]
    commands:
      - *install_deps
      - rustup component add clippy
      - cargo clippy --workspace --exclude kleos-migrate --all-targets -- -D warnings

  test:
    image: *rust_image
    when:
      - event: [push, pull_request]
    depends_on: [check]
    commands:
      - *install_deps
      - cargo test --workspace --exclude kleos-migrate

  fmt:
    image: *rust_image
    when:
      - event: [push, pull_request]
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  deny:
    image: *rust_image
    when:
      - event: [push, pull_request]
    commands:
      - cargo install --locked cargo-deny
      - cargo deny check

  # ── Release builds (tags only) ───────────────────────────────
  build-binaries:
    image: *rust_image
    when:
      - event: tag
    commands:
      - *install_deps
      - cargo build --release -p kleos-server
      - cargo build --release -p kleos-cli -p kleos-sidecar
      - cargo build --release -p kleos-credd -p kleos-cred -p kleos-mcp
      - cargo build --release -p kleos-sh -p kleos-fs -p agent-forge -p eidolon-supervisor
      - mkdir -p release-artifacts
      - |
        for bin in kleos-server kleos-cli kleos-sidecar kleos-credd kleos-cred kleos-mcp kleos-sh agent-forge eidolon-supervisor kr kw ke; do
          src="target/release/${bin}"
          if [ -f "$src" ]; then
            cp "$src" "release-artifacts/${bin}-linux-x64"
          fi
        done
      - ls -lh release-artifacts/
      - cd release-artifacts && sha256sum * > SHASUMS256.txt && cat SHASUMS256.txt

  release:
    image: woodpeckerci/plugin-release
    when:
      - event: tag
    depends_on: [build-binaries]
    settings:
      files:
        - "release-artifacts/*"
      api_key:
        from_secret: github_token
      title: "${CI_COMMIT_TAG}"
      generate_release_notes: true

  build-docker:
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: tag
    settings:
      repo: ghostframe/kleos
      tags:
        - latest
        - "${CI_COMMIT_TAG}"
      dockerfile: Dockerfile
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token

  publish-crates:
    image: *rust_image
    when:
      - event: tag
    depends_on: [build-binaries]
    environment:
      CARGO_REGISTRY_TOKEN:
        from_secret: cargo_registry_token
    commands:
      - *install_deps
      - |
        publish() {
          local crate="$1"
          local out
          if out=$(cargo publish -p "$crate" --no-verify 2>&1); then
            echo "$out"
          else
            echo "$out"
            if echo "$out" | grep -qE 'already (uploaded|exists)|crate version .* is already uploaded'; then
              echo "WARNING: $crate already published, skipping"
              return 0
            fi
            return 1
          fi
        }
        publish kleos-lib
        sleep 30
        publish kleos-cred
