[workspace]
resolver = "2"
members = ["engram-lib", "engram-server", "engram-cli", "engram-sidecar", "agent-forge"]

[workspace.dependencies]
libsql = "0.6"
rusqlite = "0.31"
tokio-rusqlite = "0.5"
deadpool-sqlite = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "=0.4.38", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
reqwest = { version = "0.12", features = ["json"] }
clap = { version = "4", features = ["derive", "env"] }
toml = "0.8"
hmac = "0.12"
sha2 = "0.10"
ort = { version = "2.0.0-rc.12", features = ["load-dynamic"] }
tokenizers = "0.21"
ndarray = "0.16"
dirs = "6"
regex = "1"
url = "2"
zip = "2"
pdf-extract = "0.7"
rand = "0.8"
async-trait = "0.1"
arrow-array = "51"
arrow-schema = "51"
futures = "0.3"
lancedb = { version = "0.4", default-features = false }
protoc-bin-vendored-linux-x86_64 = "3"
# Note: Can't use bundled sqlite with libsql in same binary - they conflict.
# Once Phase 4 lands (libsql removed from engram-lib), switch to bundled.
rusqlite = { version = "0.31" }
