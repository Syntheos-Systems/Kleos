# cargo-deny config. See https://embarkstudios.github.io/cargo-deny/.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "warn"
ignore = [
    # paste 1.0.15: upstream archived (unmaintained). No safe upgrade; pulled
    # in transitively via datafusion -> lance -> lancedb and via ratatui.
    # Track upstream replacement work; no code path in kleos consumes paste
    # directly.
    { id = "RUSTSEC-2024-0436", reason = "unmaintained; transitive via datafusion/ratatui; no direct use" },
    # lru 0.12.5: Stacked Borrows violation in IterMut (RUSTSEC-2026-0002).
    # Reachable only via tantivy 0.24 -> lance-index -> lancedb (vector path)
    # and ratatui 0.29 (cred TUI). No direct use in kleos. Cannot bump
    # without upstream lance/ratatui releases. Review by 2026-08-01.
    { id = "RUSTSEC-2026-0002", reason = "lru 0.12.5 unsound IterMut; transitive via tantivy/ratatui; review by 2026-08-01" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",

    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "0BSD",
    "Elastic-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Surface duplicate versions in CI so any new transitive dupe requires a
# deliberate exception. Known dupes (lru 0.12 + 0.16, etc.) are tracked
# upstream and re-evaluated on each lance/tantivy bump.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
