schema_version = 1
language = "de"

# German baseline lexicon for the kleos-lib intelligence pipeline.
# The runtime matcher folds inputs and lexicon entries through lowercase +
# Unicode-NFD diacritic strip + optional Snowball-German stemming
# (lexicon::fold_for_matching). TOML carries orthographically-correct German
# forms including Umlauts -- the matcher reconciles user input that omits
# Umlauts or uses inflected forms (kaufen / kaufte / gekauft).

[classes.verb_like]
words = ["lieben", "mögen", "genießen", "schätzen", "bevorzugen", "gerne haben", "lieber mögen"]

[classes.verb_dislike]
words = ["hassen", "nicht mögen", "verabscheuen", "nicht leiden können", "ablehnen", "nicht ausstehen können"]

[classes.verb_buy]
words = ["gekauft", "erworben", "bestellt", "erhalten", "bekommen", "geholt", "angeschafft"]

[classes.state_verbs]
# Grammar class -- short forms not suitable for stemming.
stem = false
words = ["bin", "ist", "sind", "war", "waren", "habe", "hat", "haben", "hatte", "hatten", "werde", "wohne", "lebe", "arbeite", "werde", "beginne", "starte"]

[classes.articles]
# Grammar class -- short tokens not stemmable.
stem = false
words = ["der", "die", "das", "ein", "eine", "mein", "meine", "dein", "deine", "sein", "seine", "ihr", "ihre", "unser", "unsere", "euer", "eure"]

[classes.stopwords]
# Grammar class -- whole-token equality only.
stem = false
words = ["und", "oder", "aber", "so", "für", "zu", "von", "in", "auf", "an", "bei", "mit", "aus", "nach", "über", "unter", "durch", "dann", "wenn", "als", "auch", "sich", "noch", "kann", "muss", "soll", "wird", "nicht", "dass", "diese", "dieser", "dieses", "jene", "jener", "jenes", "ist", "sind", "ich", "wir", "sie", "er", "es", "ihr", "man", "sich", "dabei", "daran", "dazu", "darum", "weil", "obwohl", "damit", "worüber", "welche", "welcher", "welches", "würde", "könnte", "sollte", "dann", "denn", "womit"]

[classes.first_person_pronoun]
# Grammar class -- pronouns are not stemmable.
stem = false
words = ["ich", "ich bin", "ich hab", "ich habe", "ich werde", "ich würde"]

[classes.emotion_happy]
words = ["froh", "fröhlich", "glücklich", "vergnügt", "erfreut"]
valence = 1.0
intensity = 0.6

