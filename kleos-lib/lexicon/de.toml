[classes.intensifier_weakening]
# multiplier 0.5. Grammar-like adverbs -- no stemming.
stem = false
words = ["kaum", "kaum noch", "kaum mehr"]

[classes.intensifier_softening]
# multiplier 0.6
stem = false
words = ["leicht", "sanft", "mäßig"]

[classes.intensifier_attenuating]
# multiplier 0.7
stem = false
words = ["etwas", "ein bisschen", "ein wenig", "eher", "ziemlich"]

[classes.intensifier_strong]
# multiplier 1.3
stem = false
words = ["sehr", "wirklich", "total", "völlig", "tief", "stark", "höchst", "komplett", "richtig", "echt"]

[classes.intensifier_very_strong]
# multiplier 1.4
stem = false
words = ["absolut", "extrem", "unglaublich", "äußerst", "ungemein"]

[classes.negation_marker]
# Grammar class -- short particles, no stemming.
stem = false
words = ["nicht", "nein", "niemals", "kein", "keine", "weder", "noch", "ohne", "nichts", "niemand", "nie", "ist nicht", "war nicht", "wird nicht", "kann nicht", "könnte nicht", "würde nicht", "sollte nicht", "darf nicht"]

[classes.causal_strong]
words = ["verursacht durch", "resultiert aus", "resultierte in", "hervorgerufen durch", "führte zu", "wegen", "aufgrund", "infolge", "dank", "ausgelöst durch"]

[classes.causal_context]
words = ["nach", "im Anschluss an", "angesichts", "seitdem", "weil", "daher", "folglich", "infolgedessen", "da"]

[classes.causal_weak]
# Wie EN: mix aus likelihood + kausalen Aktionsverben (kaputt/behoben).
words = ["vielleicht", "eventuell", "möglicherweise", "könnte", "kaputt", "behoben"]

[classes.filler_prefixes]
words = ["ähm", "also", "na", "hm", "tja", "weißt du", "eigentlich", "im Grunde", "ich meine", "sowieso", "nun ja", "halt", "ja"]

[classes.meta_stoplist]
words = ["als KI", "ich bin eine KI", "ich kann nicht", "ich habe keinen", "als Sprachmodell", "ich bin nicht in der Lage", "ich entschuldige mich", "um zu klären", "zusammenzufassen", "zusammenfassend", "lass mich erklären", "wie ich bereits erwähnte", "im Überblick", "wie wir besprochen haben", "um klar zu sein", "im Kontext", "weiter", "im Übrigen", "übrigens", "um auf den Punkt zu kommen"]

[classes.credential_keywords]
# Technical tokens -- stemming would distort api_key, ssh_schlüssel etc.
stem = false
words = ["Passwort", "passwort", "Kennwort", "Geheimnis", "secret", "api_key", "apikey", "token", "bearer", "Autorisierung", "credential", "privater_schlüssel", "ssh_schlüssel", "client_secret"]

[classes.atom_decision_markers]
# Markers that introduce a decision atom in a transcript.
stem = false
words = ["wir werden", "wir sollten", "entschieden zu", "entschieden für", "wir gehen mit", "verwenden", "nutzen wir"]

[classes.atom_constraint_markers]
# Markers that introduce a constraint or prohibition.
stem = false
words = ["darf nicht", "kann nicht", "niemals", "immer", "erforderlich", "verboten", "nicht tun", "nicht machen"]

[classes.atom_task_markers]
# Markers that introduce a task or todo item.
stem = false
words = ["TODO:", "zu erledigen", "muss", "werde implementieren", "werde beheben", "werde hinzufügen", "werde bauen"]

[classes.atom_question_markers]
# Markers that introduce an open question.
stem = false
words = ["nicht sicher", "unklar", "offene Frage", "muss noch herausfinden", "zu klären"]

[classes.decision_verbs]
# Phrases that introduce a decision or action choice.
stem = false
words = ["entschieden zu", "entschieden für", "werde", "umgestiegen auf", "gewählt", "gegangen mit", "optiert für", "festgelegt auf"]

[classes.identity_markers]
# Phrases that introduce an identity claim.
stem = false
words = ["bin ein", "bin eine", "betrachte mich als", "identifiziere mich als", "sehe mich als"]

[classes.value_markers]
# Phrases that signal a personal value or belief.
stem = false
words = ["wichtig für mich", "liegt mir am Herzen", "ich glaube an", "ich schätze", "mir ist wichtig", "ich kümmere mich um", "bedeutet mir viel"]

[classes.motivation_markers]
# Phrases that signal a motivation or goal.
stem = false
words = ["ich möchte", "mein Ziel ist", "ich strebe danach", "ich versuche", "ich hoffe", "ich beabsichtige", "ich will"]

[classes.favorite_marker]
# "mein Lieblings-X", "am liebsten", introducer for the favorite_regex.
# German uses compound nouns (Lieblingsfilm), so we match the stem prefix
# as well as the standalone adverb form.
stem = false
words = ["Lieblings", "liebste", "liebster", "liebstes", "am liebsten", "lieber"]

[classes.favorite_category]
# Categories that follow "mein Lieblings-X" introducer (also as compound stems).
stem = false
words = ["Essen", "Film", "Buch", "Serie", "Spiel", "Lied", "Farbe", "Sport", "Ort", "Getränk", "Künstler", "Band", "Autor", "Speise", "Musik"]

[classes.is_or_are]
# Copula for favorite_regex and cross-pattern collision skip.
# Covers present / past / subjunctive / infinitive copula forms.
stem = false
words = [
  "ist", "sind", "bin", "bist", "seid",
  "war", "waren", "warst", "wart",
  "sei", "seien", "wäre", "wären", "wärest", "wärst",
  "sein", "gewesen",
]

[classes.location_verbs]
