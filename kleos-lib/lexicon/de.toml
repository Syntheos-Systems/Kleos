# ---------------------------------------------------------------------------
# extraction.rs unit-specific patterns. DE convention: currency goes AFTER
# the amount (50 Euro, 50€) -- same as FR, so currency_symbols_prefix is empty.
# ---------------------------------------------------------------------------

[classes.extract_buy_verbs]
stem = true
words = ["gekauft", "erworben", "bestellt", "erhalten", "bekommen", "geholt", "angeschafft"]

[classes.extract_spent_verbs]
stem = true
words = ["ausgegeben", "bezahlt", "gezahlt", "aufgewendet", "investiert"]

[classes.extract_spent_preposition]
stem = false
words = ["für", "bei", "an", "auf"]

[classes.extract_have_verbs]
stem = true
words = ["habe", "hat", "haben", "besitze", "besitzt", "besitzen", "gehört", "verfüge"]

[classes.extract_exercise_verbs]
stem = true
words = ["gelaufen", "gejoggt", "gewandert", "geschwommen", "geradelt", "gefahren", "trainiert", "Sport gemacht"]

[classes.extract_made_verbs]
stem = true
words = ["gemacht", "gebacken", "gekocht", "zubereitet", "hergestellt"]

[classes.extract_earned_verbs]
stem = true
words = ["verdient", "bekommen", "erhalten", "erzielt", "eingenommen"]

[classes.extract_earned_preposition]
stem = false
words = ["für", "von", "bei", "durch", "in"]

[classes.currency_symbols_prefix]
# DE puts currency after the amount -- same convention as FR.
