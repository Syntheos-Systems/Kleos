# ---------------------------------------------------------------------------
# kleos-ingest extraction markers. Verb-based classes stem; fixed multi-word
# phrases keep stem = false. Infrastructure signals (IP/port/systemctl)
# stay hardcoded in the extractor -- they are language-agnostic.
# ---------------------------------------------------------------------------

[classes.ingest_deploy_markers]
stem = true
words = ["deployed", "deployt", "ausgerollt", "veröffentlicht", "in Produktion", "live geschaltet", "gepusht", "released", "in den Betrieb", "in prod"]

[classes.ingest_decision_markers]
