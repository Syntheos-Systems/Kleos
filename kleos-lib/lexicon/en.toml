# ---------------------------------------------------------------------------
# extraction.rs unit-specific patterns (buy/spent/have/exercise/
# made/earned). EN convention: currency goes BEFORE the amount ($50). FR uses
# the suffix convention (50 euros). Each language populates only the
# convention it natively uses; the helper picks the non-empty class.
# ---------------------------------------------------------------------------

[classes.extract_buy_verbs]
stem = true
words = ["bought", "purchased", "got", "acquired", "received", "ordered", "picked up"]

[classes.extract_spent_verbs]
stem = true
words = ["spent", "paid"]

[classes.extract_spent_preposition]
stem = false
words = ["on", "for"]

[classes.extract_have_verbs]
stem = true
words = ["have", "has", "own", "got", "owns"]

[classes.extract_exercise_verbs]
stem = true
words = ["ran", "jogged", "walked", "hiked", "swam", "cycled", "biked", "exercised"]

[classes.extract_made_verbs]
stem = true
words = ["made", "baked", "cooked", "prepared"]

[classes.extract_earned_verbs]
stem = true
words = ["earned", "made", "received", "got"]

[classes.extract_earned_preposition]
stem = false
words = ["from", "for", "in"]

[classes.currency_symbols_prefix]
stem = false
words = ["$", "USD"]

[classes.currency_symbols_suffix]
stem = false
words = []

[classes.time_units]
stem = false
words = ["hours", "hour", "minutes", "minute", "mins", "min"]

[classes.distance_units]
stem = false
words = ["miles", "mile", "km", "kilometers", "kilometer"]

# ---------------------------------------------------------------------------
# kleos-ingest extraction markers -- classification markers consumed by
# kleos-ingest/src/extractor.rs to bucket transcript turns into memory
# categories (deploy/state, decision, preference, issue, procedure).
# Verb-based classes stem; fixed multi-word phrases keep stem = false.
# Infra signals (IP/port/systemctl) stay hardcoded in the extractor since
# they are language-agnostic.
# ---------------------------------------------------------------------------

[classes.ingest_deploy_markers]
stem = true
words = ["deployed", "shipped", "pushed to", "rolled out", "released to", "went live"]

[classes.ingest_decision_markers]
stem = true
words = ["decided", "chose", "rejected", "picked", "went with", "opted for", "settled on"]

[classes.ingest_preference_markers]
stem = false
words = ["i want", "i prefer", "do not do", "don't do", "always do", "never do", "from now on"]

[classes.ingest_issue_markers]
stem = true
words = ["fixed", "bug", "broken", "error", "stack trace", "panic", "crash", "failed", "regression"]

[classes.ingest_procedure_markers]
stem = false
words = ["how to", "step 1", "step 2", "steps:", "procedure", "first you", "then you"]
