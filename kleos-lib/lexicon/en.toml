schema_version = 1
language = "en"

# English baseline lexicon for the kleos-lib intelligence pipeline.
# The intelligence sites refactor
# extraction.rs, personality.rs, valence.rs, sentiment.rs, etc. to read from
# this lexicon rather than hardcoded constants.

[classes.verb_like]
words = ["love", "like", "enjoy", "adore", "prefer"]

[classes.verb_dislike]
words = ["hate", "dislike", "detest", "loathe"]

[classes.verb_buy]
words = ["bought", "purchased", "got", "acquired", "received", "ordered", "picked up"]

[classes.state_verbs]
# Grammar class -- stemming would over-collapse short forms (is -> i).
stem = false
words = ["am", "is", "are", "was", "were", "have", "has", "had", "become", "became", "live", "work", "start"]

[classes.articles]
# Grammar class -- short tokens not suitable for stemming.
stem = false
words = ["the", "a", "an", "my", "your", "his", "her", "their", "our"]

[classes.stopwords]
# Grammar class -- whole-token equality only.
stem = false
words = ["the", "a", "an", "and", "or", "but", "so", "for", "to", "of", "in", "on", "at", "by", "with", "from", "that", "this", "these", "those", "is", "are", "have", "been", "were", "they", "about", "their", "there", "which", "would", "could", "should", "then", "than", "when", "what", "also", "into"]

[classes.first_person_pronoun]
# Grammar class -- pronouns are not stemmable.
stem = false
words = ["I", "i", "I'm", "I've", "I'll", "I'd"]

[classes.emotion_happy]
words = ["happy", "joyful", "delighted", "glad"]
valence = 1.0
intensity = 0.6

[classes.emotion_excited]
words = ["excited", "eager", "pumped"]
valence = 1.0
intensity = 0.8

[classes.emotion_grateful]
words = ["grateful", "thankful", "appreciative"]
valence = 1.0
intensity = 0.7

[classes.emotion_proud]
words = ["proud", "accomplished"]
valence = 1.0
intensity = 0.7

[classes.emotion_relieved]
words = ["relieved", "reassured"]
valence = 1.0
intensity = 0.5

[classes.emotion_thrilled]
words = ["thrilled", "ecstatic", "elated"]
valence = 1.0
intensity = 0.9

[classes.emotion_content]
words = ["content", "satisfied", "at_peace"]
valence = 1.0
intensity = 0.5

[classes.emotion_sad]
words = ["sad", "downcast", "blue", "depressed", "miserable"]
valence = -1.0
intensity = 0.6

[classes.emotion_angry]
words = ["angry", "furious", "mad", "irritated", "enraged"]
valence = -1.0
intensity = 0.8

[classes.emotion_frustrated]
words = ["frustrated", "exasperated"]
valence = -1.0
intensity = 0.7

[classes.emotion_anxious]
words = ["anxious", "nervous", "uneasy"]
valence = -1.0
intensity = 0.6

[classes.emotion_stressed]
words = ["stressed", "strained", "tense"]
valence = -1.0
intensity = 0.7

[classes.emotion_disappointed]
words = ["disappointed", "let_down", "discouraged"]
valence = -1.0
intensity = 0.6

[classes.emotion_overwhelmed]
words = ["overwhelmed", "swamped"]
valence = -1.0
intensity = 0.8

[classes.emotion_lonely]
words = ["lonely", "isolated", "alone"]
valence = -1.0
intensity = 0.7

[classes.emotion_worried]
words = ["worried", "concerned", "apprehensive"]
valence = -1.0
intensity = 0.5

[classes.emotion_bored]
words = ["bored", "uninterested"]
valence = -1.0
intensity = 0.4

[classes.intensifier_weakening]
# multiplier 0.5. Grammar-like adverbs -- no stemming.
stem = false
words = ["barely", "hardly"]

[classes.intensifier_softening]
# multiplier 0.6
stem = false
words = ["mildly"]

[classes.intensifier_attenuating]
# multiplier 0.7
stem = false
words = ["somewhat", "slightly", "a_bit", "kind_of", "sort_of"]

[classes.intensifier_strong]
# multiplier 1.3
stem = false
words = ["very", "really", "super", "totally", "deeply", "strongly", "highly", "completely", "utterly"]

[classes.intensifier_very_strong]
# multiplier 1.4
stem = false
words = ["absolutely", "extremely", "incredibly"]

[classes.negation_marker]
# Grammar class -- contractions and short particles, no stemming.
stem = false
words = ["not", "no", "never", "none", "neither", "nor", "without", "didn't", "wasn't", "isn't", "won't", "can't", "couldn't", "wouldn't", "shouldn't"]

[classes.causal_strong]
words = ["caused by", "results from", "resulted in", "produced by", "led to", "because of", "due to", "as a result", "thanks to", "triggered"]

[classes.causal_context]
words = ["after", "following", "as a result of", "given that", "since", "because", "therefore", "consequently"]

[classes.causal_weak]
# Includes both "causal action verbs" (broke / fixed -- X did something to Y)
# and "likelihood markers" (maybe / perhaps) for shared low-confidence signal.
words = ["maybe", "perhaps", "possibly", "might", "broke", "fixed"]

[classes.filler_prefixes]
words = ["um", "uh", "well", "so", "actually", "basically", "literally", "honestly", "you know", "like", "i mean", "anyway"]

[classes.meta_stoplist]
words = ["as an AI", "I am an AI", "I cannot", "I do not have", "as a language model", "I am unable", "I'm just", "I don't have access", "I apologize", "let me clarify", "to summarize", "in conclusion", "let me explain", "as I mentioned", "in summary", "as we discussed", "like I said", "to be clear", "for context", "moving on", "on another note", "by the way", "speaking of which"]

[classes.credential_keywords]
# Technical tokens -- stemming would distort api_key, ssh_key etc.
stem = false
words = ["password", "passwd", "passphrase", "secret", "api_key", "apikey", "token", "bearer", "authorization", "credential", "private_key", "ssh_key", "client_secret"]

[classes.atom_decision_markers]
# Markers that introduce a decision atom in a transcript.
stem = false
words = ["we will", "we should", "decided to", "chose to", "went with", "using"]

[classes.atom_constraint_markers]
# Markers that introduce a constraint or prohibition.
stem = false
words = ["must not", "cannot", "never", "always", "required", "forbidden", "do not"]

[classes.atom_task_markers]
# Markers that introduce a task or todo item.
stem = false
words = ["TODO:", "need to", "going to implement", "going to fix", "going to add", "going to build"]

[classes.atom_question_markers]
# Markers that introduce an open question.
stem = false
words = ["not sure", "unclear", "open question", "need to figure out"]

[classes.decision_verbs]
# Phrases that introduce a decision or action choice.
stem = false
words = ["decided to", "chose to", "going to", "switched to", "opted for", "picked", "went with"]

[classes.identity_markers]
# Phrases that introduce an identity claim.
stem = false
words = ["am a", "am an", "'m a", "'m an", "consider myself", "identify as"]

[classes.value_markers]
# Phrases that signal a personal value or belief.
stem = false
words = ["important to me", "matters to me", "I believe in", "I value", "I care about"]

[classes.motivation_markers]
# Phrases that signal a motivation or goal.
stem = false
words = ["I want to", "my goal is", "I aspire to", "I'm trying to", "I hope to", "I aim to"]

[classes.favorite_marker]
# "my favorite", "my fav", "my favourite" introducers in the favorite_regex.
stem = false
words = ["favorite", "fav", "favourite"]

[classes.favorite_category]
# Categories that follow the "my favorite X" introducer.
stem = false
words = ["food", "movie", "book", "show", "game", "song", "color", "colour", "sport", "place", "drink", "artist", "band", "author"]

[classes.is_or_are]
# Copula used inside the favorite_regex tail and by the
# cross-pattern collision skip (extraction.rs object_starts_with_copula).
# Enriched to cover present/past/future/perfect copula forms up-front
# rather than waiting for missed cases in production.
stem = false
words = [
  "is", "are", "am",
  "was", "were",
  "be", "been", "being",
  "'s", "'re", "'m",
]

[classes.location_verbs]
# Phrases that introduce a location change or current location.
stem = false
words = ["moved to", "relocated to", "live in", "living in", "staying in"]

[classes.role_verbs]
# Phrases that introduce a new role or position.
stem = false
words = ["started", "began", "got promoted to", "now work as", "am now", "just became"]

[classes.valence_anger_intense]
words = ["furious", "enraged", "livid", "outraged"]
valence = -0.9
arousal = 0.9

[classes.valence_anger_mild]
words = ["angry", "pissed", "mad", "frustrated", "annoyed", "irritated"]
valence = -0.7
