[classes.intensifier_weakening]
# multiplier 0.5. Grammar-like adverbs -- no stemming.
stem = false
words = ["à peine", "presque pas"]

[classes.intensifier_softening]
# multiplier 0.6
stem = false
words = ["doucement", "mollement"]

[classes.intensifier_attenuating]
# multiplier 0.7
stem = false
words = ["un peu", "quelque peu", "plutôt", "légèrement", "modéré"]

[classes.intensifier_strong]
# multiplier 1.3
stem = false
words = ["vraiment", "très", "fort", "totalement", "complètement", "profondément", "fortement", "hautement"]

[classes.intensifier_very_strong]
# multiplier 1.4
stem = false
words = ["absolument", "extrêmement", "incroyablement"]

[classes.negation_marker]
# Grammar class -- contractions and short particles, no stemming.
stem = false
words = ["non", "pas", "jamais", "aucun", "aucune", "ni", "sans", "n'est pas", "n'a pas", "n'était pas", "ne va pas"]

[classes.causal_strong]
words = ["causé par", "résulte de", "résulte en", "provoqué par", "du fait de", "à cause de", "en raison de", "grâce à", "déclenché"]

[classes.causal_context]
words = ["après", "suite à", "compte tenu de", "étant donné", "depuis", "parce que", "donc", "par conséquent"]

[classes.causal_weak]
# Voir en.toml: mélange likelihood + verbes d action causale (broke/fixed équivalent FR).
words = ["peut-être", "possiblement", "probablement", "pourrait", "cassé", "réparé"]

[classes.filler_prefixes]
words = ["euh", "ben", "alors", "donc", "voilà", "tu sais", "en fait", "honnêtement", "je veux dire", "bref", "bon"]

[classes.meta_stoplist]
words = ["en tant qu'IA", "je suis une IA", "je ne peux pas", "je n'ai pas", "en tant que modèle de langage", "je ne suis pas en mesure", "je m'excuse", "pour clarifier", "pour résumer", "en conclusion", "laisse-moi expliquer", "comme je l'ai dit", "en résumé", "comme nous en avons parlé", "pour être clair", "pour le contexte", "passons", "à propos", "au fait"]

[classes.credential_keywords]
# Technical tokens -- stemming would distort api_key, clé_ssh, etc.
stem = false
words = ["mot de passe", "mot_de_passe", "secret", "api_key", "apikey", "jeton", "token", "bearer", "autorisation", "credential", "clé_privée", "clé_ssh", "client_secret"]

[classes.atom_decision_markers]
# Marqueurs introduisant une décision dans un transcript.
stem = false
words = ["nous allons", "nous devrions", "on va", "décidé de", "choisi de", "parti avec", "en utilisant", "utilisant"]

[classes.atom_constraint_markers]
# Marqueurs introduisant une contrainte ou interdiction.
stem = false
words = ["ne doit pas", "ne peut pas", "jamais", "toujours", "requis", "interdit", "ne pas"]

[classes.atom_task_markers]
# Marqueurs introduisant une tâche.
stem = false
words = ["TODO:", "à faire", "besoin de", "va implémenter", "va corriger", "va ajouter", "va construire", "il faut"]

[classes.atom_question_markers]
# Marqueurs introduisant une question ouverte.
stem = false
words = ["pas sûr", "pas clair", "question ouverte", "besoin de comprendre", "à éclaircir"]

[classes.decision_verbs]
# Phrases introduisant une décision ou un choix d'action.
stem = false
words = ["décidé de", "choisi de", "vais", "suis passé à", "suis passée à", "opté pour", "pris", "est allé avec", "ai pris"]

[classes.identity_markers]
# Phrases introduisant une revendication d'identité.
stem = false
words = ["suis un", "suis une", "me considère comme", "m'identifie comme", "me définis comme"]

[classes.value_markers]
# Phrases signalant une valeur ou une croyance personnelle.
stem = false
words = ["important pour moi", "compte pour moi", "je crois en", "je valorise", "je tiens à"]

[classes.motivation_markers]
# Phrases signalant une motivation ou un objectif.
stem = false
words = ["je veux", "mon objectif est", "j'aspire à", "j'essaie de", "j'espère", "je vise à", "je souhaite"]

[classes.favorite_marker]
# Marqueurs d'introduction "mon préféré", "ma préférée", etc.
stem = false
words = ["préféré", "préférée", "préférés", "préférées", "favori", "favorite", "favoris", "favorites"]

[classes.favorite_category]
# Catégories qui suivent "mon X préféré".
stem = false
words = ["plat", "film", "livre", "série", "jeu", "chanson", "couleur", "sport", "endroit", "boisson", "artiste", "groupe", "auteur", "nourriture"]

[classes.is_or_are]
# Copule utilisée dans le motif favorite_regex et par le filtre
# cross-pattern collision skip (extraction.rs object_starts_with_copula).
# Enrichi pour couvrir indicatif présent/imparfait/futur + subjonctif courants
# au lieu d'attendre des cas oubliés en production.
stem = false
words = [
  "est", "sont", "suis", "es", "sommes", "êtes",
  "était", "étaient", "étais", "étions", "étiez",
  "sera", "seront", "serai", "seras", "serez", "serons",
  "serait", "seraient", "serais", "serions", "seriez",
  "soit", "soient", "sois", "soyons", "soyez",
  "être", "été",
]

[classes.location_verbs]
# Phrases introduisant un changement ou un état de localisation.
