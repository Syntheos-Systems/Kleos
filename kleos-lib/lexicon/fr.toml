# ---------------------------------------------------------------------------
# kleos-ingest extraction markers -- voir en.toml. Le stemmer Snowball FR
# collapse mal les conjugaisons, donc on liste explicitement les formes
# courantes (infinitif / participe passe m+f / nom) plutot que de compter
# sur le stemming pour les rapprocher.
# ---------------------------------------------------------------------------

[classes.ingest_deploy_markers]
stem = true
words = ["déployé", "déployée", "déploiement", "livré", "livrée", "poussé sur", "mis en prod", "publié", "publiée", "en production"]

[classes.ingest_decision_markers]
