schema_version = 1
language = "fr"

# French baseline lexicon for the kleos-lib intelligence pipeline.
# The runtime matcher folds inputs and
# lexicon entries through lowercase + Unicode-NFD diacritic strip +
# optional Snowball stemming (lexicon::fold_for_matching). The TOML
# can therefore carry the orthographically-correct French forms with
# their proper accents -- the matcher reconciles user input that
# omits accents or uses inflected forms (aimer / aimee / aimait).

[classes.verb_like]
words = ["aimer", "adorer", "apprécier", "préférer", "kiffer"]

[classes.verb_dislike]
words = ["détester", "haïr", "ne pas aimer", "ne pas supporter"]

[classes.verb_buy]
words = ["acheter", "acheté", "achetée", "achetés", "achetées", "acquis", "commandé", "reçu"]

[classes.state_verbs]
# Grammar class -- short forms not suitable for stemming.
stem = false
words = ["est", "suis", "es", "sont", "était", "étaient", "a", "ai", "as", "avons", "avez", "ont", "habite", "habites", "habitons", "habitez", "habitent", "travaille", "travailles", "travaillons", "travaillez", "travaillent", "devient", "deviens", "devenons", "commence", "déménage"]

[classes.articles]
# Grammar class -- short tokens not stemmable.
stem = false
words = ["le", "la", "les", "un", "une", "des", "du", "de", "mon", "ma", "mes", "ton", "ta", "tes", "son", "sa", "ses", "notre", "votre", "leur"]

[classes.stopwords]
# Grammar class -- whole-token equality only.
stem = false
words = ["et", "ou", "mais", "donc", "car", "que", "qui", "dont", "ce", "cette", "ces", "à", "de", "du", "des", "en", "sur", "sous", "dans", "par", "pour", "avec", "ont", "étaient", "leur", "leurs", "ils", "elles", "été", "propos", "lequel", "laquelle", "quel", "quelle", "serait", "pourrait", "devrait", "alors", "quand", "quoi", "aussi"]

[classes.first_person_pronoun]
# Grammar class -- pronouns are not stemmable.
stem = false
words = ["je", "j'", "j'ai", "moi", "me", "m'"]

[classes.emotion_happy]
words = ["heureux", "heureuse", "joyeux", "joyeuse"]
valence = 1.0
intensity = 0.6

[classes.emotion_excited]
words = ["excité", "excitée", "enthousiaste", "impatient", "impatiente"]
