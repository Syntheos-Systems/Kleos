[package]
name = "kleos-server"
version = "1.7.0"
edition = "2021"
rust-version.workspace = true
description = "HTTP server for Kleos -- persistent semantic memory and cognitive infrastructure for AI agents"
license = "Elastic-2.0"
repository = "https://github.com/Ghost-Frame/Kleos"
homepage = "https://kleos.syntheos.dev"
readme = "../README.md"

[[bin]]
name = "kleos-server"
path = "src/main.rs"

[lib]
name = "kleos_server"

[features]
default = ["piv"]
piv = ["kleos-mcp/piv"]

[dependencies]
kleos-lib = { path = "../kleos-lib", version = "1.2.1", features = ["sqlcipher"] }
kleos-cred = { path = "../kleos-cred", version = "1.2.1" }
kleos-client = { path = "../kleos-client", version = "1.2.1", default-features = false }
kleos-mcp = { path = "../kleos-mcp", version = "1.2.1", default-features = false }
percent-encoding = "2.3"
axum = { workspace = true, features = ["ws"] }
hmac = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }
subtle = { workspace = true }
tower = { workspace = true, features = ["util"] }
tower-http = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
reqwest = { workspace = true }
url = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
futures = { workspace = true }
async-stream = "0.3"
dashmap = "6"
rusqlite = { workspace = true }
secrecy = { workspace = true }
mimalloc = { workspace = true }
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
rust_decimal = { workspace = true }
dirs = { workspace = true }
tempfile = { workspace = true }

[dev-dependencies]
kleos-lib = { path = "../kleos-lib", version = "1.2.1", features = ["test-utils"] }
tower = { version = "0.5", features = ["util"] }
tokio = { workspace = true }
tempfile = { workspace = true }
ed25519-dalek = { workspace = true }

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/kleos-server-{ target }{ archive-suffix }"
bin-dir = "kleos-server{ binary-ext }"
pkg-fmt = "bin"

[package.metadata.binstall.overrides.x86_64-unknown-linux-gnu]
pkg-url = "{ repo }/releases/download/v{ version }/kleos-server-linux-x64"
[package.metadata.binstall.overrides.aarch64-unknown-linux-gnu]
pkg-url = "{ repo }/releases/download/v{ version }/kleos-server-linux-arm64"
[package.metadata.binstall.overrides.x86_64-apple-darwin]
pkg-url = "{ repo }/releases/download/v{ version }/kleos-server-darwin-x64"
[package.metadata.binstall.overrides.aarch64-apple-darwin]
pkg-url = "{ repo }/releases/download/v{ version }/kleos-server-darwin-arm64"
[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-url = "{ repo }/releases/download/v{ version }/kleos-server-windows-x64.exe"
