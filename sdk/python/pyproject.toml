[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kleos-client"
version = "0.3.2"
description = "Python client SDK for the Kleos memory server"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Zan" }]
keywords = ["engram", "memory", "ai", "context", "embeddings"]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kleos_client"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
